<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera de Cine Nur</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <header class="header_principal">
        <h1 class="texto_blanco_cine">Cine <span class="texto_verde_nur">Nur</span></h1>
    </header>

    <main class="contenido_principal">

        <section class="carrusel" aria-label="Peliculas_destacadas">
            <figure class="tarjeta_peli_destacada">
                <img src="banner_peliculas/scary_movie_6.jpg" alt="Banner de Scary Movie 6" class="img_destacada">
                <figcaption class="titulo_destacado">Scary Movie 6</figcaption>
            </figure>

            <div class="animacion_carrusel">
                <button class="punto_carrusel_activo" aria-label="Ver Scary Movie 6"></button>
                <button class="punto_carrusel" aria-label="Ver The Odyssey"></button>
                <button class="punto_carrusel" aria-label="Ver Spider-Man"></button>
            </div>
        </section>

        <section class="contenedor_cartelera">
            <h2 class="titulo_contenedor_cartelera">En Cartelera</h2>

            <div class="cuadricula_peliculas" id="contenedor_peliculas">

                

            </div>
        </section>

    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/cartelera.js"></script>
    <script src="js/carrusel.js"></script>
</body>
</html>
